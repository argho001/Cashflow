<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow | Login & Sign Up</title>
    <meta name="description" content="Sign in or create your Cashflow account to manage your personal finances, track expenses, and grow your wealth.">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="auth.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="light">

    <!-- Theme toggle -->
    <button class="auth-theme-toggle" id="auth-theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Toast notification -->
    <div class="auth-toast" id="auth-toast">
        <i class="fas fa-check-circle"></i>
        <span id="auth-toast-msg">Success!</span>
    </div>

    <div class="auth-page">
        <!-- Floating orbs -->
        <div class="auth-orb auth-orb--1"></div>
        <div class="auth-orb auth-orb--2"></div>
        <div class="auth-orb auth-orb--3"></div>

        <div class="auth-container">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <img src="./logo.png" alt="Cashflow Logo">
                    <span>Cashflow</span>
                </div>
                <p>Personal Finance Management System</p>
            </div>

            <!-- Auth Card -->
            <div class="auth-card">
                <!-- Tab Switcher -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tab-login" data-tab="login">Sign In</button>
                    <button class="auth-tab" id="tab-signup" data-tab="signup">Create Account</button>
                </div>

                <!-- ===== LOGIN PANEL ===== -->
                <div class="auth-panel active" id="panel-login">
                    <form id="login-form" novalidate>
                        <div class="auth-form-group">
                            <label for="login-email">Email Address</label>
                            <div class="auth-input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
                            </div>
                        </div>

                        <div class="auth-form-group">
                            <label for="login-password">Password</label>
                            <div class="auth-input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password" style="padding-right: 2.75rem;">
                                <button type="button" class="auth-password-toggle" data-target="login-password" aria-label="Show password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="auth-options">
                            <label class="auth-checkbox">
                                <input type="checkbox" id="remember-me" checked>
                                Remember me
                            </label>
                            <a href="#" class="auth-forgot" id="forgot-password-link">Forgot password?</a>
                        </div>

                        <button type="submit" class="auth-submit" id="login-submit">
                            <i class="fas fa-sign-in-alt"></i>&nbsp; Sign In
                        </button>
                    </form>

                    <p class="auth-terms" style="margin-top: 1.5rem;">Made By Group - 1</p>
                </div>

                <!-- ===== SIGNUP PANEL ===== -->
                <div class="auth-panel" id="panel-signup">
                    <form id="signup-form" novalidate>
                        <div class="auth-form-group">
                            <label for="signup-name">Full Name</label>
                            <div class="auth-input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="signup-name" placeholder="Argho Sarkar" required autocomplete="name">
                            </div>
                        </div>

                        <div class="auth-form-group">
                            <label for="signup-email">Email Address</label>
                            <div class="auth-input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
                            </div>
                        </div>

                        <div class="auth-form-group">
                            <label for="signup-password">Password</label>
                            <div class="auth-input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="signup-password" placeholder="Create a strong password" required autocomplete="new-password" minlength="6" style="padding-right: 2.75rem;">
                                <button type="button" class="auth-password-toggle" data-target="signup-password" aria-label="Show password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <!-- Strength meter -->
                            <div class="auth-strength-meter" id="strength-meter">
                                <div class="auth-strength-bar" id="str-bar-1"></div>
                                <div class="auth-strength-bar" id="str-bar-2"></div>
                                <div class="auth-strength-bar" id="str-bar-3"></div>
                                <div class="auth-strength-bar" id="str-bar-4"></div>
                            </div>
                            <div class="auth-strength-text" id="strength-text"></div>
                        </div>

                        <div class="auth-form-group">
                            <label for="signup-confirm">Confirm Password</label>
                            <div class="auth-input-wrapper">
                                <i class="fas fa-shield-alt"></i>
                                <input type="password" id="signup-confirm" placeholder="Re-enter your password" required autocomplete="new-password" style="padding-right: 2.75rem;">
                                <button type="button" class="auth-password-toggle" data-target="signup-confirm" aria-label="Show password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="auth-submit" id="signup-submit">
                            <i class="fas fa-user-plus"></i>&nbsp; Create Account
                        </button>

                        <p class="auth-terms">
                            By signing up, you agree to our
                            <a href="#">Terms of Service</a> and
                            <a href="#">Privacy Policy</a>.
                        </p>
                    </form>
                </div>
            </div>


        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
